services:
  relay:
    build:
      context: ../..
      dockerfile: deploy/relay/Dockerfile
    image: fern/relay:latest
    container_name: fern-relay
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ../.env
    environment:
      FERN_DATA_DIR: /data
    volumes:
      - ${FERN_DATA_DIR:-./data}:/data
    networks:
      - fern
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"127.0.0.1\", 8765)); s.close()'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  fern:
    name: fern-relay
    driver: bridge
